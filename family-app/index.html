<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Семья</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 22px; font-weight: 700; }
  header span { font-size: 28px; }

  nav {
    display: flex;
    overflow-x: auto;
    background: white;
    border-bottom: 2px solid #e2e8f0;
    padding: 0 12px;
  }
  nav button {
    flex-shrink: 0;
    padding: 14px 16px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 13px;
    color: #718096;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  nav button.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
  nav button:hover { color: #667eea; }

  .page { display: none; padding: 20px; max-width: 700px; margin: 0 auto; }
  .page.active { display: block; }

  .card {
    background: white;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .card h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .member-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 2px solid transparent;
    font-weight: 500;
    transition: all 0.15s;
  }
  .chip.selected { color: white; }
  .chip-мама { background: #fed7e2; color: #97266d; }
  .chip-мама.selected { background: #d53f8c; border-color: #97266d; }
  .chip-папа { background: #bee3f8; color: #2b6cb0; }
  .chip-папа.selected { background: #3182ce; border-color: #2b6cb0; }
  .chip-Арслан { background: #c6f6d5; color: #276749; }
  .chip-Арслан.selected { background: #38a169; border-color: #276749; }
  .chip-Алим { background: #fefcbf; color: #975a16; }
  .chip-Алим.selected { background: #d69e2e; border-color: #975a16; }
  .chip-Альмира { background: #e9d8fd; color: #553c9a; }
  .chip-Альмира.selected { background: #805ad5; border-color: #553c9a; }

  .task-list { list-style: none; }
  .task-item {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f7fafc;
    gap: 10px;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #667eea; }
  .task-item.done span { text-decoration: line-through; color: #a0aec0; }
  .task-item span { flex: 1; font-size: 14px; }
  .task-item .assignee {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #cbd5e0;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
  }
  .del-btn:hover { color: #fc8181; }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .add-row input, .add-row select {
    flex: 1;
    min-width: 120px;
    padding: 9px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-row input:focus, .add-row select:focus { border-color: #667eea; }
  .add-btn {
    padding: 9px 18px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .add-btn:hover { background: #5a67d8; }

  .member-color-мама { background: #fed7e2; color: #97266d; }
  .member-color-папа { background: #bee3f8; color: #2b6cb0; }
  .member-color-Арслан { background: #c6f6d5; color: #276749; }
  .member-color-Алим { background: #fefcbf; color: #975a16; }
  .member-color-Альмира { background: #e9d8fd; color: #553c9a; }
  .member-color-все { background: #e2e8f0; color: #4a5568; }

  .event-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #f7fafc;
    align-items: flex-start;
  }
  .event-item:last-child { border-bottom: none; }
  .event-date {
    background: #667eea;
    color: white;
    border-radius: 10px;
    padding: 6px 10px;
    text-align: center;
    min-width: 52px;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .event-date .day { font-size: 20px; line-height: 1.1; }
  .event-info { flex: 1; }
  .event-info .title { font-weight: 600; font-size: 14px; }
  .event-info .meta { font-size: 12px; color: #718096; margin-top: 2px; }
  .event-participants { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .event-participants .chip-sm {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .shop-item {
    display: flex;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid #f7fafc;
    gap: 10px;
  }
  .shop-item:last-child { border-bottom: none; }
  .shop-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #38a169; }
  .shop-item.done span { text-decoration: line-through; color: #a0aec0; }
  .shop-item span { flex: 1; font-size: 14px; }
  .shop-item .qty { font-size: 12px; color: #718096; background: #f7fafc; padding: 2px 8px; border-radius: 8px; }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 16px;
  }
  .cal-header { text-align: center; font-size: 11px; font-weight: 700; color: #718096; padding: 4px; }
  .cal-day {
    text-align: center;
    padding: 6px 2px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    position: relative;
    min-height: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .cal-day:hover { background: #ebf4ff; }
  .cal-day.today { background: #667eea; color: white; font-weight: 700; }
  .cal-day.has-event::after {
    content: '';
    width: 5px;
    height: 5px;
    background: #f6ad55;
    border-radius: 50%;
    position: absolute;
    bottom: 4px;
  }
  .cal-day.today.has-event::after { background: white; }
  .cal-day.empty { cursor: default; }
  .cal-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .cal-nav button {
    background: none;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 16px;
    color: #4a5568;
  }
  .cal-nav button:hover { background: #f7fafc; }
  .cal-nav span { font-weight: 700; font-size: 15px; }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #f7fafc;
  }
  .lesson-item:last-child { border-bottom: none; }
  .lesson-time {
    font-size: 13px;
    font-weight: 700;
    color: #667eea;
    min-width: 50px;
  }
  .lesson-info { flex: 1; }
  .lesson-info .name { font-size: 14px; font-weight: 600; }
  .lesson-info .detail { font-size: 12px; color: #718096; }
  .lesson-day {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 8px;
    background: #ebf4ff;
    color: #3182ce;
    font-weight: 600;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #718096;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
  }

  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    flex: 1;
    background: white;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .stat-card .num { font-size: 28px; font-weight: 800; color: #667eea; }
  .stat-card .label { font-size: 11px; color: #718096; margin-top: 2px; }

  @media (max-width: 480px) {
    .add-row { flex-direction: column; }
    .add-row input, .add-row select, .add-btn { min-width: 0; width: 100%; }
    .stats-row { flex-wrap: wrap; }
    .stat-card { min-width: 80px; }
  }
</style>
</head>
<body>

<header>
  <span>🏠</span>
  <div>
    <h1>Наша Семья</h1>
    <div style="font-size:12px;opacity:0.85">Мама · Папа · Арслан · Алим · Альмира</div>
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('duties')">🧹 Обязанности</button>
  <button onclick="showPage('shopping')">🛒 Продукты</button>
  <button onclick="showPage('events')">🎉 Мероприятия</button>
  <button onclick="showPage('lessons')">📚 Занятия</button>
</nav>

<!-- ОБЯЗАННОСТИ -->
<div id="page-duties" class="page active">
  <div class="stats-row">
    <div class="stat-card"><div class="num" id="stat-done">0</div><div class="label">Выполнено</div></div>
    <div class="stat-card"><div class="num" id="stat-total">0</div><div class="label">Всего задач</div></div>
    <div class="stat-card"><div class="num" id="stat-pct">0%</div><div class="label">Прогресс</div></div>
  </div>

  <div id="duties-sections"></div>

  <div class="card">
    <h3>➕ Добавить обязанность</h3>
    <div class="add-row">
      <input id="duty-text" placeholder="Название задачи..." />
      <select id="duty-cat">
        <option value="cleaning">🧹 Уборка</option>
        <option value="ironing">👕 Глажка</option>
        <option value="groceries">🛒 Покупки</option>
      </select>
      <select id="duty-member">
        <option>Мама</option>
        <option>Папа</option>
        <option>Арслан</option>
        <option>Алим</option>
        <option>Альмира</option>
        <option>все</option>
      </select>
      <button class="add-btn" onclick="addDuty()">Добавить</button>
    </div>
  </div>
</div>

<!-- ПРОДУКТЫ -->
<div id="page-shopping" class="page">
  <div class="card">
    <h3>🛒 Список покупок</h3>
    <ul class="task-list" id="shop-list"></ul>
    <div class="add-row" style="margin-top:14px">
      <input id="shop-item" placeholder="Название продукта..." />
      <input id="shop-qty" placeholder="Кол-во" style="max-width:90px" />
      <button class="add-btn" onclick="addShopItem()">Добавить</button>
    </div>
  </div>
  <div class="card" style="text-align:center;padding:14px 18px">
    <button onclick="clearBought()" style="background:#e53e3e;color:white;border:none;border-radius:8px;padding:9px 20px;cursor:pointer;font-size:14px;font-weight:600">
      🗑 Очистить купленное
    </button>
  </div>
</div>

<!-- МЕРОПРИЯТИЯ -->
<div id="page-events" class="page">
  <div class="card">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="cal-title"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="calendar-grid" id="cal-grid"></div>
  </div>

  <div class="card">
    <h3>📅 Все мероприятия</h3>
    <div id="events-list"></div>
  </div>

  <div class="card">
    <h3>➕ Добавить мероприятие</h3>
    <div class="add-row">
      <input id="ev-title" placeholder="Название..." />
      <input id="ev-date" type="date" />
      <input id="ev-time" type="time" />
    </div>
    <div class="member-chips" id="ev-members" style="margin-top:10px">
      <div class="chip chip-мама" data-name="Мама" onclick="toggleEvMember(this)">Мама</div>
      <div class="chip chip-папа" data-name="Папа" onclick="toggleEvMember(this)">Папа</div>
      <div class="chip chip-Арслан" data-name="Арслан" onclick="toggleEvMember(this)">Арслан</div>
      <div class="chip chip-Алим" data-name="Алим" onclick="toggleEvMember(this)">Алим</div>
      <div class="chip chip-Альмира" data-name="Альмира" onclick="toggleEvMember(this)">Альмира</div>
    </div>
    <button class="add-btn" onclick="addEvent()">Добавить мероприятие</button>
  </div>
</div>

<!-- ЗАНЯТИЯ -->
<div id="page-lessons" class="page">
  <div class="card">
    <h3>📅 Расписание занятий</h3>
    <div id="lessons-list"></div>
  </div>

  <div class="card">
    <h3>➕ Добавить занятие</h3>
    <div class="add-row">
      <input id="les-name" placeholder="Название занятия..." />
      <select id="les-member">
        <option>Мама</option>
        <option>Папа</option>
        <option>Арслан</option>
        <option>Алим</option>
        <option>Альмира</option>
      </select>
    </div>
    <div class="add-row" style="margin-top:8px">
      <select id="les-day">
        <option>Понедельник</option>
        <option>Вторник</option>
        <option>Среда</option>
        <option>Четверг</option>
        <option>Пятница</option>
        <option>Суббота</option>
        <option>Воскресенье</option>
      </select>
      <input id="les-time" type="time" />
      <input id="les-place" placeholder="Место / онлайн" />
    </div>
    <button class="add-btn" style="margin-top:10px" onclick="addLesson()">Добавить занятие</button>
  </div>
</div>

<script>
const MEMBERS = ['Мама','Папа','Арслан','Алим','Альмира'];
const MEMBER_KEY = {'Мама':'мама','Папа':'папа','Арслан':'Арслан','Алим':'Алим','Альмира':'Альмира','все':'все'};
const CAT_LABELS = { cleaning:'🧹 Уборка', ironing:'👕 Глажка', groceries:'🛒 Покупки' };
const DAYS_RU = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let state = JSON.parse(localStorage.getItem('family-app') || 'null') || {
  duties: [
    {id:1,text:'Вымыть полы в зале',cat:'cleaning',member:'Мама',done:false},
    {id:2,text:'Пропылесосить ковры',cat:'cleaning',member:'Папа',done:false},
    {id:3,text:'Погладить рубашки',cat:'ironing',member:'Мама',done:false},
    {id:4,text:'Погладить школьную форму',cat:'ironing',member:'Альмира',done:false},
    {id:5,text:'Купить хлеб и молоко',cat:'groceries',member:'Папа',done:false},
    {id:6,text:'Протереть пыль',cat:'cleaning',member:'Арслан',done:false},
    {id:7,text:'Купить фрукты',cat:'groceries',member:'Алим',done:false},
  ],
  shopping: [
    {id:1,name:'Молоко',qty:'2л',done:false},
    {id:2,name:'Хлеб',qty:'1 буханка',done:false},
    {id:3,name:'Яйца',qty:'30 шт',done:false},
    {id:4,name:'Масло сливочное',qty:'200г',done:false},
    {id:5,name:'Картофель',qty:'2 кг',done:false},
  ],
  events: [
    {id:1,title:'День рождения Алима',date:'2026-06-15',time:'12:00',members:['Мама','Папа','Арслан','Алим','Альмира']},
    {id:2,title:'Родительское собрание',date:'2026-06-10',time:'18:00',members:['Мама','Папа']},
    {id:3,title:'Поход в кино',date:'2026-06-20',time:'15:00',members:['Арслан','Алим','Альмира']},
  ],
  lessons: [
    {id:1,name:'Английский язык',member:'Арслан',day:'Понедельник',time:'16:00',place:'Онлайн'},
    {id:2,name:'Математика',member:'Алим',day:'Вторник',time:'15:30',place:'Репетитор'},
    {id:3,name:'Танцы',member:'Альмира',day:'Среда',time:'17:00',place:'ДК Центральный'},
    {id:4,name:'Английский язык',member:'Альмира',day:'Пятница',time:'16:00',place:'Онлайн'},
  ],
  nextId: 100
};

function save() { localStorage.setItem('family-app', JSON.stringify(state)); }

// ── НАВИГАЦИЯ ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  event.target.classList.add('active');
  if(id==='duties') renderDuties();
  if(id==='shopping') renderShopping();
  if(id==='events') renderEvents();
  if(id==='lessons') renderLessons();
}

// ── ОБЯЗАННОСТИ ──
function renderDuties() {
  const cats = ['cleaning','ironing','groceries'];
  const container = document.getElementById('duties-sections');
  container.innerHTML = '';
  cats.forEach(cat => {
    const items = state.duties.filter(d=>d.cat===cat);
    if(!items.length) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${CAT_LABELS[cat]}</h3><ul class="task-list" id="cat-${cat}"></ul>`;
    container.appendChild(card);
    const ul = document.getElementById('cat-'+cat);
    items.forEach(d => {
      const mk = MEMBER_KEY[d.member] || 'все';
      ul.innerHTML += `
        <li class="task-item ${d.done?'done':''}" id="duty-${d.id}">
          <input type="checkbox" ${d.done?'checked':''} onchange="toggleDuty(${d.id})">
          <span>${d.text}</span>
          <span class="assignee member-color-${mk}">${d.member}</span>
          <button class="del-btn" onclick="delDuty(${d.id})">×</button>
        </li>`;
    });
  });
  const done = state.duties.filter(d=>d.done).length;
  const total = state.duties.length;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pct').textContent = total ? Math.round(done/total*100)+'%' : '0%';
}
function toggleDuty(id) {
  const d = state.duties.find(x=>x.id===id);
  if(d) d.done = !d.done;
  save(); renderDuties();
}
function delDuty(id) {
  state.duties = state.duties.filter(x=>x.id!==id);
  save(); renderDuties();
}
function addDuty() {
  const text = document.getElementById('duty-text').value.trim();
  if(!text) return;
  state.duties.push({
    id: ++state.nextId,
    text,
    cat: document.getElementById('duty-cat').value,
    member: document.getElementById('duty-member').value,
    done: false
  });
  document.getElementById('duty-text').value = '';
  save(); renderDuties();
}

// ── ПОКУПКИ ──
function renderShopping() {
  const ul = document.getElementById('shop-list');
  ul.innerHTML = '';
  state.shopping.forEach(s => {
    ul.innerHTML += `
      <li class="shop-item ${s.done?'done':''}" id="shop-${s.id}">
        <input type="checkbox" ${s.done?'checked':''} onchange="toggleShop(${s.id})">
        <span>${s.name}</span>
        ${s.qty?`<span class="qty">${s.qty}</span>`:''}
        <button class="del-btn" onclick="delShop(${s.id})">×</button>
      </li>`;
  });
}
function toggleShop(id) {
  const s = state.shopping.find(x=>x.id===id);
  if(s) s.done = !s.done;
  save(); renderShopping();
}
function delShop(id) {
  state.shopping = state.shopping.filter(x=>x.id!==id);
  save(); renderShopping();
}
function addShopItem() {
  const name = document.getElementById('shop-item').value.trim();
  if(!name) return;
  state.shopping.push({id:++state.nextId, name, qty:document.getElementById('shop-qty').value.trim(), done:false});
  document.getElementById('shop-item').value = '';
  document.getElementById('shop-qty').value = '';
  save(); renderShopping();
}
function clearBought() {
  state.shopping = state.shopping.filter(s=>!s.done);
  save(); renderShopping();
}

// ── МЕРОПРИЯТИЯ ──
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function renderCalendar() {
  const title = document.getElementById('cal-title');
  title.textContent = MONTHS_RU[calMonth] + ' ' + calYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = DAYS_RU.map(d=>`<div class="cal-header">${d}</div>`).join('');

  const first = new Date(calYear, calMonth, 1).getDay();
  const offset = (first === 0) ? 6 : first - 1;
  const days = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date();

  const eventDays = new Set(
    state.events
      .filter(e => { const d=new Date(e.date); return d.getFullYear()===calYear && d.getMonth()===calMonth; })
      .map(e => new Date(e.date).getDate())
  );

  for(let i=0;i<offset;i++) grid.innerHTML += `<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++) {
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const hasEv = eventDays.has(d);
    grid.innerHTML += `<div class="cal-day ${isToday?'today':''} ${hasEv?'has-event':''}">${d}</div>`;
  }
}
function changeMonth(dir) {
  calMonth += dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}

function renderEvents() {
  renderCalendar();
  const sorted = [...state.events].sort((a,b)=>a.date.localeCompare(b.date));
  const container = document.getElementById('events-list');
  container.innerHTML = '';
  if(!sorted.length){ container.innerHTML='<div style="color:#a0aec0;text-align:center;padding:20px">Нет мероприятий</div>'; return; }
  sorted.forEach(ev => {
    const d = new Date(ev.date);
    const day = d.getDate();
    const mon = MONTHS_RU[d.getMonth()].slice(0,3);
    const chips = ev.members.map(m=>{
      const mk = MEMBER_KEY[m]||'все';
      return `<span class="chip-sm member-color-${mk}">${m}</span>`;
    }).join('');
    container.innerHTML += `
      <div class="event-item">
        <div class="event-date"><div class="day">${day}</div>${mon}</div>
        <div class="event-info">
          <div class="title">${ev.title}</div>
          <div class="meta">${ev.time||''}</div>
          <div class="event-participants">${chips}</div>
        </div>
        <button class="del-btn" onclick="delEvent(${ev.id})" style="font-size:18px">×</button>
      </div>`;
  });
}
function toggleEvMember(el) { el.classList.toggle('selected'); }
function addEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const date = document.getElementById('ev-date').value;
  if(!title||!date) return alert('Укажите название и дату');
  const members = [...document.querySelectorAll('#ev-members .chip.selected')].map(c=>c.dataset.name);
  state.events.push({id:++state.nextId, title, date, time:document.getElementById('ev-time').value, members});
  document.getElementById('ev-title').value='';
  document.getElementById('ev-date').value='';
  document.getElementById('ev-time').value='';
  document.querySelectorAll('#ev-members .chip').forEach(c=>c.classList.remove('selected'));
  save(); renderEvents();
}
function delEvent(id) {
  state.events = state.events.filter(x=>x.id!==id);
  save(); renderEvents();
}

// ── ЗАНЯТИЯ ──
const DAY_ORDER = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
function renderLessons() {
  const container = document.getElementById('lessons-list');
  const byDay = {};
  DAY_ORDER.forEach(d => byDay[d]=[]);
  state.lessons.forEach(l => { if(byDay[l.day]) byDay[l.day].push(l); });
  container.innerHTML = '';
  DAY_ORDER.forEach(day => {
    const items = byDay[day].sort((a,b)=>a.time.localeCompare(b.time));
    if(!items.length) return;
    container.innerHTML += `<div class="section-title">${day}</div>`;
    items.forEach(l => {
      const mk = MEMBER_KEY[l.member]||'все';
      container.innerHTML += `
        <div class="lesson-item">
          <div class="lesson-time">${l.time}</div>
          <div class="lesson-info">
            <div class="name">${l.name}</div>
            <div class="detail">${l.place||''}</div>
          </div>
          <span class="assignee member-color-${mk}" style="padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600">${l.member}</span>
          <button class="del-btn" onclick="delLesson(${l.id})">×</button>
        </div>`;
    });
  });
  if(!state.lessons.length) container.innerHTML='<div style="color:#a0aec0;text-align:center;padding:20px">Нет занятий</div>';
}
function addLesson() {
  const name = document.getElementById('les-name').value.trim();
  const time = document.getElementById('les-time').value;
  if(!name||!time) return alert('Укажите название и время');
  state.lessons.push({
    id:++state.nextId, name,
    member: document.getElementById('les-member').value,
    day: document.getElementById('les-day').value,
    time, place: document.getElementById('les-place').value.trim()
  });
  document.getElementById('les-name').value='';
  document.getElementById('les-time').value='';
  document.getElementById('les-place').value='';
  save(); renderLessons();
}
function delLesson(id) {
  state.lessons = state.lessons.filter(x=>x.id!==id);
  save(); renderLessons();
}

// init
renderDuties();
</script>
